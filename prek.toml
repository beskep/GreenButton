#:schema https://www.schemastore.org/prek.json

[[repos]]
repo  = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-added-large-files" },
  { id = "check-json" },
  { id = "check-toml" },
  { id = "check-yaml" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id       = "ruff-check"
name     = "ruff check"
entry    = "uvx ruff check --fix"
language = "system"
types_or = ["python", "pyi", "jupyter"]

[[repos.hooks]]
id       = "ruff-format"
name     = "ruff format"
entry    = "uvx ruff format"
language = "system"
types_or = ["python", "pyi", "jupyter"]

[[repos.hooks]]
id       = "biome-format"
name     = "biome format"
entry    = "mise x -- biome format --write"
language = "system"
types_or = ["json"]

[[repos.hooks]]
id       = "tombi-format"
name     = "tombi format"
entry    = "mise x -- tombi format"
language = "system"
files    = '\.toml$'
